spec_version: 1
name: detraff_env
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: "Autonomous Traffic Control with Emergency Priority"

tasks:
  - id: low_traffic
    name: "low_traffic"
    description: "Basic intersection management with low volume."
    grader:
      type: "reward_threshold"
      threshold: 0.8

  - id: normal_traffic
    name: "normal_traffic"
    description: "Standard volume with occasional emergency vehicles."
    grader:
      type: "reward_threshold"
      threshold: 0.5

  - id: emergency_peak
    name: "emergency_peak"
    description: "High volume with frequent emergency vehicle priority needs."
    grader:
      type: "reward_threshold"
      threshold: 0.3

evaluation:
  metrics:
    - "reward"
  max_episode_steps: 20
  time_limit: 300